name: Deploy Backend to Linode K8s

on:
  push:
    branches: [main]
    paths: [backend/**]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/mirra-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy to Linode K8s
        uses: tale/kubectl-action@v1
        with:
          base64-kube-config: ${{ secrets.KUBE_CONFIG }}
        env:
          IMAGE_TAG: ${{ github.sha }}
      - run: |
          kubectl set image deployment/mirra-backend \
            mirra-backend=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            -n default
          kubectl rollout status deployment/mirra-backend -n default --timeout=120s
