apiVersion: apps/v1
kind: Deployment
metadata:
  name: mirra-backend
  namespace: mirra
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mirra-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: mirra-backend
    spec:
      containers:
        - name: mirra-backend
          image: ghcr.io/projects-hacks/mirra-ai/mirra-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: mirra-secrets
          env:
            - name: REDIS_URL
              value: "redis://redis.mirra.svc.cluster.local:6379/0"
            - name: CORS_ORIGIN
              value: "https://mirra.vercel.app"
            - name: USE_MOCKS
              value: "false"
            - name: PORT
              value: "8000"
          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
      imagePullSecrets:
        - name: ghcr-secret
---
apiVersion: v1
kind: Service
metadata:
  name: mirra-backend
  namespace: mirra
spec:
  selector:
    app: mirra-backend
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
